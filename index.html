<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trench Command</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="hud">
        <div class="hud-left">
          <h1>Trench Command</h1>
          <span id="status">Staging troops — mass for the assault</span>
        </div>
        <div class="hud-center">
          <button id="btn-pause" class="btn">Pause</button>
        </div>
        <div class="hud-right">
          <div id="replacements">Call up troops via sector buttons below the map</div>
          <div id="artillery-status">Artillery: —</div>
        </div>
      </header>
      <div id="toolbar">
        <span class="label">Mode:</span>
        <button id="mode-select" class="btn btn-active">Select / Move</button>
        <button id="mode-artillery" class="btn">Artillery</button>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="legend">
        <span><i class="dot player"></i> Your platoons</span>
        <span><i class="dot enemy"></i> Enemy platoons</span>
        <span><i class="dot mg"></i> Machine gun</span>
        <span><i class="dot arty"></i> Artillery zone</span>
        <span class="hint">Tap platoon to select · double-tap sector to advance · Artillery: tap NML to fire, tap bracket to stop</span>
      </div>
      <div id="overlay" class="hidden">
        <div id="overlay-content"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
